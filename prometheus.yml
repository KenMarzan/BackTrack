global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: "backtrack-monitor"

scrape_configs:
  # Prometheus itself
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # cAdvisor - Container metrics
  - job_name: "cadvisor"
    static_configs:
      - targets: ["localhost:8888"]

  # Frontend service
  - job_name: "frontend"
    static_configs:
      - targets: ["frontend:8080"]

  # Checkout service
  - job_name: "checkoutservice"
    static_configs:
      - targets: ["checkoutservice:8081"]

  # Product Catalog service
  - job_name: "productcatalogservice"
    static_configs:
      - targets: ["productcatalogservice:3550"]

  # Currency service
  - job_name: "currencyservice"
    static_configs:
      - targets: ["currencyservice:7000"]

  # Cart service
  - job_name: "cartservice"
    static_configs:
      - targets: ["cartservice:7070"]

  # Recommendation service
  - job_name: "recommendationservice"
    static_configs:
      - targets: ["recommendationservice:8080"]

  # Shipping service
  - job_name: "shippingservice"
    static_configs:
      - targets: ["shippingservice:50051"]

  # Email service
  - job_name: "emailservice"
    static_configs:
      - targets: ["emailservice:8080"]

  # Payment service
  - job_name: "paymentservice"
    static_configs:
      - targets: ["paymentservice:50051"]

  # Ad service
  - job_name: "adservice"
    static_configs:
      - targets: ["adservice:9555"]
