# cAdvisor stack for BackTrack
# Prometheus runs separately on port 9090
# Run with: docker-compose up -d

services:
  # cAdvisor - Container metrics exporter
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    ports:
      - "8888:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - default
    privileged: true

networks:
  default:
    name: backtrack-metrics
    driver: bridge
