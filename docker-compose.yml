version: "3.9"

services:
  backtrack-dashboard:
    image: zeritzuu/backtrack-dashboard:latest
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - BACKTRACK_AGENT_URL=http://backtrack-agent:9090
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - backtrack-data:/.backtrack
    depends_on:
      - backtrack-agent

  agent-cors-proxy:
    image: nginx:alpine
    ports:
      - "9090:9090"
    volumes:
      - ./nginx-cors.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backtrack-agent

  backtrack-agent:
    image: backtrack-agent-fixed:latest
    build:
      context: ./backtrack-agent
      dockerfile: Dockerfile
    environment:
      - BACKTRACK_TARGET=${BACKTRACK_TARGET:-}
      - BACKTRACK_IMAGE_TAG=${BACKTRACK_IMAGE_TAG:-unknown}
      - BACKTRACK_ROLLBACK_ENABLED=${BACKTRACK_ROLLBACK_ENABLED:-true}
      - BACKTRACK_SCRAPE_INTERVAL=${BACKTRACK_SCRAPE_INTERVAL:-10}
      - BACKTRACK_CORPUS_SIZE=${BACKTRACK_CORPUS_SIZE:-30}
    volumes:
      - backtrack-data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "9092:9090"

volumes:
  backtrack-data:
